var COLORS={Pd:[42,157,143],O:[240,113,103]};
var RM={Pd:1.3,O:0.7};
var canvas,ctx,W,H;
var rotX=-65,rotY=20,rotZ=5,zoom=1.0,panX=0,panY=0;
var dragging=false,lastMX=0,lastMY=0,shiftDrag=false;
var currentSlab='S1_Pd100';
var atoms=[];
var baseScale=1;

function loadSlab(k){
  var s=SLAB_DATA[k];atoms=[];
  var p=s.positions,sy=s.symbols;
  var cx=0,cy=0,cz=0,n=p.length;
  for(var i=0;i<n;i++){cx+=p[i][0];cy+=p[i][1];cz+=p[i][2];}
  cx/=n;cy/=n;cz/=n;
  for(var i=0;i<n;i++){
    atoms.push({x:p[i][0]-cx,y:p[i][1]-cy,z:p[i][2]-cz,sym:sy[i]});
  }
  // Auto-fit: find bounding sphere radius
  var maxR=0;
  for(var i=0;i<atoms.length;i++){
    var a=atoms[i];
    var r2=a.x*a.x+a.y*a.y+a.z*a.z;
    if(r2>maxR)maxR=r2;
  }
  maxR=Math.sqrt(maxR);
  var minDim=Math.min(W,H);
  baseScale=(minDim*0.35)/Math.max(maxR,1);
  zoom=1.0;panX=0;panY=0;
  var nPd=sy.filter(function(x){return x==='Pd';}).length;
  var nO=sy.filter(function(x){return x==='O';}).length;
  document.getElementById('info').innerHTML='<b>'+s.label+'</b><br>'+n+' atoms (Pd='+nPd+', O='+nO+')';
}

function rp(x,y,z){
  var rx=rotX*Math.PI/180,ry=rotY*Math.PI/180,rz=rotZ*Math.PI/180;
  var x1=x*Math.cos(rz)-y*Math.sin(rz),y1=x*Math.sin(rz)+y*Math.cos(rz),z1=z;
  var x2=x1*Math.cos(ry)+z1*Math.sin(ry),y2=y1,z2=-x1*Math.sin(ry)+z1*Math.cos(ry);
  return[x2,y2*Math.cos(rx)-z2*Math.sin(rx),y2*Math.sin(rx)+z2*Math.cos(rx)];
}

function draw(){
  ctx.fillStyle='#1a1a2e';ctx.fillRect(0,0,W,H);
  var sc=baseScale*zoom;
  var pr=[];
  for(var i=0;i<atoms.length;i++){
    var a=atoms[i],r=rp(a.x,a.y,a.z);
    pr.push({sx:W/2+r[0]*sc+panX,sy:H/2-r[1]*sc+panY,d:r[2],sym:a.sym});
  }
  pr.sort(function(a,b){return a.d-b.d;});
  if(pr.length===0)return;
  var dmin=pr[0].d,dmax=pr[pr.length-1].d,dr=Math.max(dmax-dmin,1);
  for(var i=0;i<pr.length;i++){
    var p=pr[i];
    var rad=(RM[p.sym]||0.8)*sc*0.12;
    if(rad<1)rad=1;
    var c=COLORS[p.sym]||[128,128,128];
    var df=0.5+0.5*((p.d-dmin)/dr);
    var cr=Math.round(c[0]*df),cg=Math.round(c[1]*df),cb=Math.round(c[2]*df);
    var g=ctx.createRadialGradient(p.sx-rad*0.3,p.sy-rad*0.3,rad*0.05,p.sx,p.sy,rad);
    g.addColorStop(0,'rgb('+Math.min(255,cr+80)+','+Math.min(255,cg+80)+','+Math.min(255,cb+80)+')');
    g.addColorStop(0.5,'rgb('+cr+','+cg+','+cb+')');
    g.addColorStop(1,'rgb('+Math.round(cr*0.4)+','+Math.round(cg*0.4)+','+Math.round(cb*0.4)+')');
    ctx.beginPath();ctx.arc(p.sx,p.sy,rad,0,Math.PI*2);
    ctx.fillStyle=g;ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.2)';ctx.lineWidth=0.5;ctx.stroke();
  }
  document.getElementById('coords').textContent='X: '+rotX.toFixed(1)+'    Y: '+rotY.toFixed(1)+'    Z: '+rotZ.toFixed(1);
}

function selectSlab(k){
  currentSlab=k;loadSlab(k);
  var bs=document.querySelectorAll('#top-bar button');
  for(var i=0;i<bs.length;i++)bs[i].classList.remove('active');
  document.getElementById('btn-'+k).classList.add('active');
  draw();
}

function resize(){W=window.innerWidth;H=window.innerHeight;canvas.width=W;canvas.height=H;if(atoms.length>0){loadSlab(currentSlab);}draw();}

window.onload=function(){
  canvas=document.getElementById('c');ctx=canvas.getContext('2d');
  W=window.innerWidth;H=window.innerHeight;canvas.width=W;canvas.height=H;
  window.addEventListener('resize',resize);
  canvas.addEventListener('mousedown',function(e){dragging=true;shiftDrag=e.shiftKey;lastMX=e.clientX;lastMY=e.clientY;});
  window.addEventListener('mouseup',function(){dragging=false;});
  window.addEventListener('mousemove',function(e){
    if(!dragging)return;
    var dx=e.clientX-lastMX,dy=e.clientY-lastMY;
    if(shiftDrag){panX+=dx;panY+=dy;}else{rotY+=dx*0.5;rotX+=dy*0.5;}
    lastMX=e.clientX;lastMY=e.clientY;draw();
  });
  canvas.addEventListener('wheel',function(e){e.preventDefault();zoom*=e.deltaY>0?0.92:1.08;zoom=Math.max(0.1,Math.min(10,zoom));draw();},{passive:false});
  window.addEventListener('keydown',function(e){
    if(e.key==='ArrowLeft'){rotY-=1;draw();}
    else if(e.key==='ArrowRight'){rotY+=1;draw();}
    else if(e.key==='ArrowUp'){rotX-=1;draw();}
    else if(e.key==='ArrowDown'){rotX+=1;draw();}
    else if(e.key==='q'||e.key==='Q'){rotZ-=1;draw();}
    else if(e.key==='e'||e.key==='E'){rotZ+=1;draw();}
    else if(e.key==='r'||e.key==='R'){rotX=-65;rotY=20;rotZ=5;zoom=1;panX=0;panY=0;loadSlab(currentSlab);draw();}
  });
  selectSlab('S1_Pd100');
};
