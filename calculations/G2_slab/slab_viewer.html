<html>
<head>
<meta charset="utf-8">
<title>G2 Slab Viewer</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',Arial,sans-serif;background:#222;overflow:hidden}
  .bar{background:#2a9d8f;color:#fff;padding:8px 16px;display:flex;gap:14px;align-items:center;flex-wrap:wrap;font-size:13px}
  .bar h1{font-size:16px;margin-right:8px}
  .bar select,.bar input{font-size:13px;padding:2px 6px}
  .bar label{font-weight:600}
  .sl{display:flex;align-items:center;gap:3px}
  .sl input[type=range]{width:70px}
  .sl .v{width:28px;text-align:right;font-size:11px}
  .dot{width:11px;height:11px;border-radius:50%;display:inline-block}
  canvas{display:block;cursor:grab}

  #tip{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);color:#aaa;font-size:12px}
</style>
</head>
<body>
<div class="bar">

  <span><span class="dot" style="background:#2a9d8f"></span> Pd</span>

    var colL=COLS_LIGHT[p.elem]||"#aaa";
    var colD=COLS_DARK[p.elem]||"#555";
    var g=ctx.createRadialGradient(p.x-p.r*0.3,p.y-p.r*0.3,p.r*0.05,p.x,p.y,p.r);
    g.addColorStop(0,colL);
    g.addColorStop(0.5,col);
    g.addColorStop(1,colD);
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=g;
    ctx.fill();
  }
}

C.onmousedown=function(e){dragging=true;lastX=e.clientX;lastY=e.clientY;shiftKey=e.shiftKey};
C.onmouseup=function(){dragging=false};
C.onmouseleave=function(){dragging=false};
C.onmousemove=function(e){
  if(!dragging)return;
  var dx=e.clientX-lastX,dy=e.clientY-lastY;
  if(shiftKey||e.shiftKey){panX+=dx;panY+=dy}
  else{ry+=dx*0.008;rx+=dy*0.008}
  lastX=e.clientX;lastY=e.clientY;
  draw();
};
C.onwheel=function(e){
  e.preventDefault();
  zoom*=e.deltaY>0?0.95:1.05;
  zoom=Math.max(5,Math.min(200,zoom));
  draw();
};
C.addEventListener("touchstart",function(e){
  if(e.touches.length===1){dragging=true;lastX=e.touches[0].clientX;lastY=e.touches[0].clientY}
},{passive:false});
C.addEventListener("touchmove",function(e){
  e.preventDefault();
  if(!dragging||e.touches.length!==1)return;
  var dx=e.touches[0].clientX-lastX,dy=e.touches[0].clientY-lastY;
  ry+=dx*0.008;rx+=dy*0.008;
  lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;draw();
},{passive:false});
C.addEventListener("touchend",function(){dragging=false});

resize();load();
</script>
